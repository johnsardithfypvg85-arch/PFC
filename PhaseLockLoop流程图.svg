<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1760" viewBox="0 0 1500 1760">
  <defs>
    <style>
      .bg { fill: #f6f3ee; }
      .title { font: 700 34px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #1f2937; }
      .sub { font: 500 18px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #4b5563; }
      .box { fill: #fffdf8; stroke: #8b5e34; stroke-width: 2.5; rx: 18; ry: 18; }
      .box2 { fill: #eef6ff; stroke: #355c8a; stroke-width: 2.5; rx: 18; ry: 18; }
      .box3 { fill: #fef3e2; stroke: #c97b18; stroke-width: 2.5; rx: 18; ry: 18; }
      .diamond { fill: #fffaf0; stroke: #7c3aed; stroke-width: 2.5; }
      .text { font: 600 22px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #1f2937; }
      .small { font: 500 18px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #374151; }
      .code { font: 600 18px Consolas, 'Courier New', monospace; fill: #7c2d12; }
      .line { stroke: #6b7280; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .line2 { stroke: #94a3b8; stroke-width: 3.5; fill: none; marker-end: url(#arrow2); }
      .tag { font: 700 18px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #7c3aed; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#6b7280"/>
    </marker>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="1760"/>

  <text class="title" x="750" y="54" text-anchor="middle">PhaseLockLoop() 流程图</text>
  <text class="sub" x="750" y="86" text-anchor="middle">作用：根据输入电压极性和过零点，修正 PLL 步长并生成正弦表索引 PLL.CntFianl</text>

  <rect class="box" x="450" y="120" width="600" height="90"/>
  <text class="text" x="750" y="158" text-anchor="middle">进入 PhaseLockLoop()</text>
  <text class="small" x="750" y="188" text-anchor="middle">输入来自 ADCSample()：SADC.Vac、SADC.Imos</text>

  <path class="line" d="M750 210 L750 260"/>

  <polygon class="diamond" points="750,260 930,340 750,420 570,340"/>
  <text class="text" x="750" y="334" text-anchor="middle">判断 SADC.Vac 极性</text>
  <text class="small" x="750" y="364" text-anchor="middle">Vac &gt; 0 ?</text>

  <text class="tag" x="1010" y="310">是，进入正半周路径</text>
  <text class="tag" x="320" y="310">否，继续判断 Vac &lt; 0</text>

  <path class="line" d="M930 340 L1080 340 L1080 420"/>
  <path class="line" d="M570 340 L390 340 L390 420"/>

  <rect class="box2" x="930" y="420" width="300" height="90"/>
  <text class="text" x="1080" y="458" text-anchor="middle">正半周分支</text>
  <text class="small" x="1080" y="488" text-anchor="middle">当前输入电压大于 0</text>

  <rect class="box2" x="240" y="420" width="300" height="90"/>
  <text class="text" x="390" y="458" text-anchor="middle">负半周判断</text>
  <text class="small" x="390" y="488" text-anchor="middle">只有 Vac &lt; 0 才进入</text>

  <path class="line" d="M1080 510 L1080 560"/>
  <path class="line" d="M390 510 L390 560"/>

  <polygon class="diamond" points="1080,560 1260,640 1080,720 900,640"/>
  <text class="small" x="1080" y="628" text-anchor="middle">是否发生负到正过零？</text>
  <text class="code" x="1080" y="658" text-anchor="middle">PLL.Polar==0 &amp;&amp; PLL.NegCnt&gt;100</text>

  <polygon class="diamond" points="390,560 570,640 390,720 210,640"/>
  <text class="small" x="390" y="628" text-anchor="middle">是否发生正到负过零？</text>
  <text class="code" x="390" y="658" text-anchor="middle">PLL.Polar==1 &amp;&amp; PLL.PosCnt&gt;100</text>

  <path class="line" d="M1260 640 L1360 640 L1360 760 L1180 760"/>
  <path class="line" d="M570 640 L680 640 L680 760 L500 760"/>
  <path class="line2" d="M900 640 L820 640 L820 900 L1030 900"/>
  <path class="line2" d="M210 640 L120 640 L120 900 L330 900"/>

  <text class="tag" x="1340" y="626">是</text>
  <text class="tag" x="830" y="626">否</text>
  <text class="tag" x="660" y="626">是</text>
  <text class="tag" x="132" y="626">否</text>

  <rect class="box3" x="930" y="760" width="300" height="140"/>
  <text class="text" x="1080" y="802" text-anchor="middle">负 → 正 过零处理</text>
  <text class="small" x="1080" y="834" text-anchor="middle">PosCnt=0，NegCnt=0</text>
  <text class="small" x="1080" y="864" text-anchor="middle">PLL.Polar = 1，StepSum = 0</text>
  <text class="small" x="1080" y="894" text-anchor="middle">准备重新对齐正半周相位</text>

  <rect class="box3" x="240" y="760" width="300" height="140"/>
  <text class="text" x="390" y="802" text-anchor="middle">正 → 负 过零处理</text>
  <text class="small" x="390" y="834" text-anchor="middle">NegCnt=0</text>
  <text class="small" x="390" y="864" text-anchor="middle">PLL.Polar = 0，StepSum = 0</text>
  <text class="small" x="390" y="894" text-anchor="middle">准备重新对齐负半周相位</text>

  <path class="line" d="M1080 900 L1080 950"/>
  <path class="line" d="M390 900 L390 950"/>

  <rect class="box" x="810" y="950" width="540" height="130"/>
  <text class="text" x="1080" y="992" text-anchor="middle">过零后的步长修正</text>
  <text class="small" x="1080" y="1024" text-anchor="middle">PLL.CntErr = MAX_SINE_CNT - PLL.Cnt</text>
  <text class="small" x="1080" y="1054" text-anchor="middle">PLL.Step += PLL.CntErr * PLL_K，并限幅到 8389 ~ 13005</text>

  <rect class="box" x="120" y="950" width="540" height="130"/>
  <text class="text" x="390" y="992" text-anchor="middle">过零后的步长修正</text>
  <text class="small" x="390" y="1024" text-anchor="middle">PLL.CntErr = MAX_SINE_CNT - PLL.Cnt</text>
  <text class="small" x="390" y="1054" text-anchor="middle">PLL.Step += PLL.CntErr * PLL_K，并限幅到 8389 ~ 13005</text>

  <path class="line2" d="M1030 1080 L1030 1140 L820 1140"/>
  <path class="line2" d="M450 1080 L450 1140 L680 1140"/>
  <path class="line2" d="M1080 510 L1080 1140"/>
  <path class="line2" d="M390 510 L390 1140"/>

  <rect class="box2" x="680" y="1140" width="640" height="170"/>
  <text class="text" x="1000" y="1182" text-anchor="middle">正半周常规处理</text>
  <text class="small" x="1000" y="1214" text-anchor="middle">PosCnt++</text>
  <text class="small" x="1000" y="1244" text-anchor="middle">Vac.Sum += SADC.Vac</text>
  <text class="small" x="1000" y="1274" text-anchor="middle">Iac.Sum += SADC.Imos</text>

  <rect class="box2" x="180" y="1140" width="430" height="170"/>
  <text class="text" x="395" y="1182" text-anchor="middle">负半周常规处理</text>
  <text class="small" x="395" y="1214" text-anchor="middle">NegCnt++</text>
  <text class="small" x="395" y="1244" text-anchor="middle">当 NegCnt == 100 时</text>
  <text class="small" x="395" y="1274" text-anchor="middle">Flag.RmsCalReady = 1</text>

  <path class="line" d="M1000 1310 L1000 1360"/>
  <path class="line" d="M395 1310 L395 1360 L1000 1360"/>

  <rect class="box3" x="540" y="1360" width="920" height="170"/>
  <text class="text" x="1000" y="1402" text-anchor="middle">统一相位累加与索引生成</text>
  <text class="small" x="1000" y="1434" text-anchor="middle">PLL.StepSum += PLL.Step</text>
  <text class="small" x="1000" y="1464" text-anchor="middle">PLL.Cnt = PLL.StepSum >> 12</text>
  <text class="small" x="1000" y="1494" text-anchor="middle">如果超过 1023，则回绕：PLL.CntFianl = PLL.Cnt - 1023，否则直接使用 PLL.Cnt</text>

  <path class="line" d="M1000 1530 L1000 1580"/>

  <rect class="box" x="620" y="1580" width="760" height="110"/>
  <text class="text" x="1000" y="1622" text-anchor="middle">输出结果</text>
  <text class="small" x="1000" y="1654" text-anchor="middle">PLL.CntFianl 成为后续 FeedCal() 查正弦表的索引，同时为 RMS 计算提供半周时序基准</text>

  <path class="line2" d="M750 420 L750 1680 L620 1680"/>
  <text class="small" x="680" y="1714">注：SADC.Vac == 0 时，两条分支都不会进入，函数直接执行相位累加部分</text>
</svg>
