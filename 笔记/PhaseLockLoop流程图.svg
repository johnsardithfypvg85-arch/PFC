<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1660" viewBox="0 0 1600 1660">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8f5ef"/>
      <stop offset="100%" stop-color="#f2ede5"/>
    </linearGradient>
    <style>
      .title { font: 700 34px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #475569; }
      .panel { fill: #fffdf9; stroke: #8b5e34; stroke-width: 2.5; }
      .positive { fill: #eef6ff; stroke: #2563eb; stroke-width: 2.5; }
      .negative { fill: #fff3e8; stroke: #c2410c; stroke-width: 2.5; }
      .neutral { fill: #f8fafc; stroke: #64748b; stroke-width: 2.5; }
      .accent { fill: #fff6e8; stroke: #d97706; stroke-width: 2.5; }
      .diamond { fill: #fffaf3; stroke: #7c3aed; stroke-width: 2.7; }
      .h1 { font: 700 24px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #1f2937; }
      .h2 { font: 700 22px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #1f2937; }
      .body { font: 500 18px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #334155; }
      .code { font: 600 17px Consolas, 'Courier New', monospace; fill: #7c2d12; }
      .label-pos { font: 700 18px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #2563eb; }
      .label-neg { font: 700 18px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #c2410c; }
      .label-neutral { font: 700 18px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #475569; }
      .line-main { stroke: #64748b; stroke-width: 4; fill: none; marker-end: url(#arrow-main); }
      .line-pos { stroke: #2563eb; stroke-width: 4; fill: none; marker-end: url(#arrow-pos); }
      .line-neg { stroke: #c2410c; stroke-width: 4; fill: none; marker-end: url(#arrow-neg); }
      .line-soft { stroke: #94a3b8; stroke-width: 3.5; stroke-dasharray: 9 8; fill: none; marker-end: url(#arrow-soft); }
      .foot { font: 500 16px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #475569; }
    </style>
    <marker id="arrow-main" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-pos" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-neg" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#c2410c"/>
    </marker>
    <marker id="arrow-soft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="1660" fill="url(#bgGrad)"/>

  <text class="title" x="800" y="56" text-anchor="middle">PhaseLockLoop() 流程图</text>
  <text class="subtitle" x="800" y="88" text-anchor="middle">重绘版：按正半周、负半周、Vac == 0 三条通道分开，减少箭头交叉</text>

  <rect class="panel" x="470" y="110" width="660" height="96" rx="20" ry="20"/>
  <text class="h1" x="800" y="151" text-anchor="middle">进入 PhaseLockLoop()</text>
  <text class="body" x="800" y="182" text-anchor="middle">输入来自 ADCSample()：SADC.Vac、SADC.Imos</text>

  <path class="line-main" d="M800 206 V240"/>

  <polygon class="diamond" points="800,240 1040,325 800,410 560,325"/>
  <text class="h2" x="800" y="315" text-anchor="middle">判断 SADC.Vac 极性</text>
  <text class="body" x="800" y="347" text-anchor="middle">Vac &gt; 0 / Vac &lt; 0 / Vac == 0</text>

  <path class="line-neg" d="M560 325 L300 470"/>
  <path class="line-main" d="M800 410 V470"/>
  <path class="line-pos" d="M1040 325 L1300 470"/>

  <text class="label-neg" x="420" y="382" text-anchor="middle">Vac &lt; 0</text>
  <text class="label-neutral" x="870" y="442" text-anchor="start">Vac == 0</text>
  <text class="label-pos" x="1180" y="382" text-anchor="middle">Vac &gt; 0</text>

  <rect class="negative" x="80" y="470" width="440" height="96" rx="18" ry="18"/>
  <text class="h2" x="300" y="510" text-anchor="middle">负半周路径</text>
  <text class="body" x="300" y="542" text-anchor="middle">只有 SADC.Vac &lt; 0 时进入</text>

  <rect class="neutral" x="550" y="470" width="500" height="112" rx="18" ry="18"/>
  <text class="h2" x="800" y="510" text-anchor="middle">零点特例</text>
  <text class="body" x="800" y="542" text-anchor="middle">SADC.Vac == 0 时，不进入正/负半周分支</text>
  <text class="body" x="800" y="572" text-anchor="middle">保持当前 PLL 状态，直接执行底部相位累加</text>

  <rect class="positive" x="1080" y="470" width="440" height="96" rx="18" ry="18"/>
  <text class="h2" x="1300" y="510" text-anchor="middle">正半周路径</text>
  <text class="body" x="1300" y="542" text-anchor="middle">只有 SADC.Vac &gt; 0 时进入</text>

  <path class="line-neg" d="M300 566 V620"/>
  <path class="line-pos" d="M1300 566 V620"/>

  <polygon class="diamond" points="300,620 520,705 300,790 80,705"/>
  <text class="body" x="300" y="694" text-anchor="middle">是否发生正 -&gt; 负过零？</text>
  <text class="code" x="300" y="726" text-anchor="middle">PLL.Polar == 1 &amp;&amp; PLL.PosCnt &gt; 100</text>

  <polygon class="diamond" points="1300,620 1520,705 1300,790 1080,705"/>
  <text class="body" x="1300" y="694" text-anchor="middle">是否发生负 -&gt; 正过零？</text>
  <text class="code" x="1300" y="726" text-anchor="middle">PLL.Polar == 0 &amp;&amp; PLL.NegCnt &gt; 100</text>

  <text class="label-neg" x="326" y="818">是</text>
  <text class="label-neutral" x="548" y="690">否</text>
  <text class="label-pos" x="1326" y="818">是</text>
  <text class="label-neutral" x="1052" y="690">否</text>

  <path class="line-neg" d="M300 790 V840"/>
  <path class="line-soft" d="M520 705 H610 V1143 H520"/>

  <path class="line-pos" d="M1300 790 V840"/>
  <path class="line-soft" d="M1080 705 H990 V1143 H1080"/>

  <rect class="accent" x="60" y="840" width="480" height="170" rx="18" ry="18"/>
  <text class="h2" x="300" y="882" text-anchor="middle">正 -&gt; 负 过零校正</text>
  <text class="body" x="300" y="916" text-anchor="middle">NegCnt = 0，PLL.Polar = 0，StepSum = 0</text>
  <text class="body" x="300" y="948" text-anchor="middle">PLL.CntErr = 1023 - PLL.Cnt</text>
  <text class="body" x="300" y="980" text-anchor="middle">PLL.Step += PLL.CntErr * PLL_K，限幅到 8389 ~ 13005</text>

  <rect class="accent" x="1060" y="840" width="480" height="170" rx="18" ry="18"/>
  <text class="h2" x="1300" y="882" text-anchor="middle">负 -&gt; 正 过零校正</text>
  <text class="body" x="1300" y="916" text-anchor="middle">PosCnt = 0，NegCnt = 0，PLL.Polar = 1，StepSum = 0</text>
  <text class="body" x="1300" y="948" text-anchor="middle">PLL.CntErr = 1023 - PLL.Cnt</text>
  <text class="body" x="1300" y="980" text-anchor="middle">PLL.Step += PLL.CntErr * PLL_K，限幅到 8389 ~ 13005</text>

  <path class="line-neg" d="M300 1010 V1070"/>
  <path class="line-pos" d="M1300 1010 V1070"/>

  <rect class="negative" x="80" y="1070" width="440" height="146" rx="18" ry="18"/>
  <text class="h2" x="300" y="1112" text-anchor="middle">负半周常规处理</text>
  <text class="body" x="300" y="1146" text-anchor="middle">NegCnt++</text>
  <text class="body" x="300" y="1178" text-anchor="middle">若 NegCnt == 100，则 Flag.RmsCalReady = 1</text>

  <rect class="positive" x="1080" y="1070" width="440" height="146" rx="18" ry="18"/>
  <text class="h2" x="1300" y="1112" text-anchor="middle">正半周常规处理</text>
  <text class="body" x="1300" y="1146" text-anchor="middle">PosCnt++</text>
  <text class="body" x="1300" y="1178" text-anchor="middle">Vac.Sum += SADC.Vac，Iac.Sum += SADC.Imos</text>

  <path class="line-main" d="M800 582 V1260"/>
  <path class="line-neg" d="M300 1216 V1240 H620 V1260"/>
  <path class="line-pos" d="M1300 1216 V1240 H980 V1260"/>

  <rect class="panel" x="380" y="1260" width="840" height="180" rx="20" ry="20"/>
  <text class="h1" x="800" y="1304" text-anchor="middle">统一相位累加与索引生成</text>
  <text class="body" x="800" y="1338" text-anchor="middle">PLL.StepSum += PLL.Step</text>
  <text class="body" x="800" y="1370" text-anchor="middle">PLL.Cnt = PLL.StepSum &gt;&gt; 12</text>
  <text class="body" x="800" y="1402" text-anchor="middle">若 PLL.Cnt &gt; 1023，则 PLL.CntFianl = PLL.Cnt - 1023</text>
  <text class="body" x="800" y="1434" text-anchor="middle">否则 PLL.CntFianl = PLL.Cnt</text>

  <path class="line-main" d="M800 1440 V1480"/>

  <rect class="panel" x="500" y="1480" width="600" height="96" rx="20" ry="20"/>
  <text class="h1" x="800" y="1521" text-anchor="middle">输出结果</text>
  <text class="body" x="800" y="1552" text-anchor="middle">PLL.CntFianl 供 FeedCal() 查正弦表，并提供 RMS 半周节奏基准</text>

  <text class="foot" x="800" y="1616" text-anchor="middle">旁路虚线表示“不发生过零时直接进入常规处理”，主干箭头全部保持单向向下合流</text>
</svg>
